<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>이유진 — 창의융합연구원 원장</title>
<meta name="description" content="창의융합연구원(KICON) 원장 이유진 디지털 명함">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --orange: #FF6B00;
    --orange-hover: #FF8529;
    --black: #090909;
    --dark: #141414;
    --dark-card: #1C1C1C;
    --gray-800: #333;
    --gray-600: #666;
    --gray-400: #999;
    --gray-200: #DDD;
    --white: #FFFFFF;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Noto Sans KR', -apple-system, sans-serif;
    background: var(--black);
    min-height: 100dvh;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 16px;
    -webkit-font-smoothing: antialiased;
  }

  .card {
    width: 100%;
    max-width: 400px;
    background: var(--dark);
    border-radius: 28px;
    overflow: hidden;
    box-shadow:
      0 50px 100px rgba(0,0,0,0.6),
      0 0 0 1px rgba(255,255,255,0.04);
    animation: rise 0.7s cubic-bezier(0.16, 1, 0.3, 1) both;
  }

  @keyframes rise {
    from { opacity: 0; transform: translateY(24px) scale(0.97); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }

  .top-bar { height: 4px; background: var(--orange); }

  /* ── Header ── */
  .header {
    padding: 36px 28px 28px;
    text-align: center;
  }

  .avatar {
    width: 108px;
    height: 108px;
    border-radius: 18px;
    background: #fff;
    border: 1px solid rgba(255,255,255,0.12);
    padding: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 20px;
    font-family: 'Outfit', sans-serif;
    font-size: 28px;
    font-weight: 700;
    color: var(--orange);
    letter-spacing: -1px;
    overflow: hidden;
  }

  .avatar img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    display: block;
  }

  .name {
    font-size: 26px;
    font-weight: 700;
    color: var(--white);
    letter-spacing: -0.5px;
    margin-bottom: 6px;
  }

  .title-line {
    font-size: 14px;
    font-weight: 400;
    color: var(--gray-400);
    letter-spacing: 0.5px;
  }

  .title-line .role { color: var(--orange); font-weight: 500; }

  .divider {
    width: 40px;
    height: 2px;
    background: rgba(255,255,255,0.08);
    margin: 24px auto 0;
  }

  /* ── Info ── */
  .info-section { padding: 4px 28px 24px; }

  .info-item {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 14px 0;
    border-bottom: 1px solid rgba(255,255,255,0.04);
    text-decoration: none;
    color: var(--gray-200);
    transition: color 0.2s;
    cursor: pointer;
  }

  .info-item:last-child { border-bottom: none; }
  .info-item:hover { color: var(--white); }
  .info-item:hover .info-icon { color: var(--orange); background: rgba(255,107,0,0.08); }

  .info-icon {
    width: 36px;
    height: 36px;
    border-radius: 10px;
    background: rgba(255,255,255,0.04);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: color 0.2s, background 0.2s;
    color: var(--gray-400);
  }

  .info-icon svg { width: 18px; height: 18px; }

  .info-label {
    font-size: 11px;
    color: var(--gray-600);
    text-transform: uppercase;
    letter-spacing: 1px;
    font-weight: 500;
    margin-bottom: 2px;
    font-family: 'Outfit', sans-serif;
  }

  .info-value { font-size: 14px; font-weight: 400; color: inherit; word-break: break-all; }

  /* ── CTA ── */
  .cta-section { padding: 0 28px 28px; }

  .save-btn {
    width: 100%;
    padding: 16px;
    border: none;
    border-radius: 14px;
    background: var(--orange);
    color: var(--white);
    font-size: 15px;
    font-weight: 600;
    font-family: 'Noto Sans KR', sans-serif;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    transition: background 0.2s, transform 0.1s;
    letter-spacing: -0.3px;
  }

  .save-btn:hover { background: var(--orange-hover); }
  .save-btn:active { transform: scale(0.98); }
  .save-btn svg { width: 18px; height: 18px; }

  /* ── Footer ── */
  .footer {
    padding: 16px 28px 20px;
    text-align: center;
    border-top: 1px solid rgba(255,255,255,0.04);
  }

  .footer-logo {
    font-family: 'Outfit', sans-serif;
    font-size: 11px;
    font-weight: 600;
    color: var(--gray-600);
    letter-spacing: 3px;
    text-transform: uppercase;
  }

  /* ── Toast ── */
  .toast {
    position: fixed;
    bottom: 40px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--dark-card);
    color: var(--white);
    padding: 12px 24px;
    border-radius: 12px;
    font-size: 13px;
    font-weight: 500;
    border: 1px solid rgba(255,255,255,0.08);
    box-shadow: 0 10px 40px rgba(0,0,0,0.4);
    opacity: 0;
    pointer-events: none;
    transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    z-index: 100;
  }

  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  @media (max-width: 380px) {
    .header { padding: 28px 20px 24px; }
    .info-section { padding: 4px 20px 20px; }
    .cta-section { padding: 0 20px 24px; }
    .name { font-size: 22px; }
  }
</style>
</head>
<body>

<div class="card">
  <div class="top-bar"></div>

  <div class="header">
    <div class="avatar">
      <img src="/card/qr-code-dark.png" alt="QR 코드" />
    </div>
    <div class="name">이유진</div>
    <div class="title-line">창의융합연구원 <span class="role">원장</span></div>
    <div class="divider"></div>
  </div>

  <div class="info-section">
    <a href="tel:010-2327-1730" class="info-item">
      <div class="info-icon">
        <svg fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M2.25 6.75c0 8.284 6.716 15 15 15h2.25a2.25 2.25 0 0 0 2.25-2.25v-1.372c0-.516-.351-.966-.852-1.091l-4.423-1.106c-.44-.11-.902.055-1.173.417l-.97 1.293c-.282.376-.769.542-1.21.38a12.035 12.035 0 0 1-7.143-7.143c-.162-.441.004-.928.38-1.21l1.293-.97c.363-.271.527-.734.417-1.173L6.963 3.102a1.125 1.125 0 0 0-1.091-.852H4.5A2.25 2.25 0 0 0 2.25 4.5v2.25Z"/></svg>
      </div>
      <div>
        <div class="info-label">Phone</div>
        <div class="info-value">010-2327-1730</div>
      </div>
    </a>

    <a href="mailto:hieugenelee@gmail.com" class="info-item">
      <div class="info-icon">
        <svg fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M21.75 6.75v10.5a2.25 2.25 0 0 1-2.25 2.25h-15a2.25 2.25 0 0 1-2.25-2.25V6.75m19.5 0A2.25 2.25 0 0 0 19.5 4.5h-15a2.25 2.25 0 0 0-2.25 2.25m19.5 0v.243a2.25 2.25 0 0 1-1.07 1.916l-7.5 4.615a2.25 2.25 0 0 1-2.36 0L3.32 8.91a2.25 2.25 0 0 1-1.07-1.916V6.75"/></svg>
      </div>
      <div>
        <div class="info-label">Email</div>
        <div class="info-value">hieugenelee@gmail.com</div>
      </div>
    </a>

    <a href="https://www.kicon.kr" target="_blank" rel="noopener" class="info-item">
      <div class="info-icon">
        <svg fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 21a9.004 9.004 0 0 0 8.716-6.747M12 21a9.004 9.004 0 0 1-8.716-6.747M12 21c2.485 0 4.5-4.03 4.5-9S14.485 3 12 3m0 18c-2.485 0-4.5-4.03-4.5-9S9.515 3 12 3m0 0a8.997 8.997 0 0 1 7.843 4.582M12 3a8.997 8.997 0 0 0-7.843 4.582m15.686 0A11.953 11.953 0 0 1 12 10.5c-2.998 0-5.74-1.1-7.843-2.918m15.686 0A8.959 8.959 0 0 1 21 12c0 .778-.099 1.533-.284 2.253m0 0A17.919 17.919 0 0 1 12 16.5a17.92 17.92 0 0 1-8.716-2.247m0 0A9 9 0 0 1 3 12c0-1.47.353-2.856.978-4.082"/></svg>
      </div>
      <div>
        <div class="info-label">Website</div>
        <div class="info-value">www.kicon.kr</div>
      </div>
    </a>
  </div>

  <div class="cta-section">
    <button class="save-btn" onclick="saveContact()">
      <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline stroke-linecap="round" stroke-linejoin="round" points="17 21 17 13 7 13 7 21"/><polyline stroke-linecap="round" stroke-linejoin="round" points="7 3 7 8 15 8"/></svg>
      연락처 저장하기
    </button>
  </div>

  <div class="footer">
    <div class="footer-logo">KICON</div>
  </div>
</div>

<div class="toast" id="toast">연락처가 다운로드되었습니다</div>

<script>
function saveContact() {
  const vcard = [
    'BEGIN:VCARD',
    'VERSION:3.0',
    'N:이;유진;;;',
    'FN:이유진',
    'ORG:창의융합연구원',
    'TITLE:원장',
    'TEL;TYPE=CELL:010-2327-1730',
    'EMAIL;TYPE=INTERNET:hieugenelee@gmail.com',
    'URL:https://www.kicon.kr',
    'NOTE:창의융합연구원(KICON) 원장',
    'END:VCARD'
  ].join('\r\n');

  const blob = new Blob([vcard], { type: 'text/vcard;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = '이유진_창의융합연구원.vcf';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);

  const toast = document.getElementById('toast');
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2500);
}
</script>
</body>
</html>
